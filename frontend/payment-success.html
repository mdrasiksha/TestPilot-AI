<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Success</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: sans-serif;
      padding-top: 100px;
      margin: 0;
    }
    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 10px;
      display: inline-block;
      max-width: 540px;
      margin: 0 16px;
    }
    .status-note {
      margin-top: 16px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
    }
    .status-warning {
      background: #7f1d1d;
      color: #fecaca;
    }
    .status-info {
      background: #0f766e;
      color: #ccfbf1;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      background: #22c55e;
      border: none;
      color: black;
      cursor: pointer;
      border-radius: 6px;
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>✅ Payment Successful</h1>
  <p>🎉 You now have Pro access</p>
  <p>🚀 Unlimited test cases unlocked</p>
  <div id="statusMessage" class="status-note" style="display: none;"></div>
  <button onclick="goHome()">Go to Dashboard</button>
</div>

<script>
  function goHome() {
    window.location.href = "/";
  }

  const params = new URLSearchParams(window.location.search);
  const status = (params.get("razorpay_payment_link_status") || "").toLowerCase();
  const statusMessage = document.getElementById("statusMessage");

  if (status && status !== "paid") {
    statusMessage.style.display = "block";
    statusMessage.classList.add("status-warning");
    statusMessage.textContent = "Payment is still processing or was not completed. Your Pro access is granted only after server-side webhook verification.";
  } else {
    statusMessage.style.display = "block";
    statusMessage.classList.add("status-info");
    statusMessage.textContent = "Your payment status is being securely verified by our backend webhook. No action needed.";
  }
</script>

</body>
</html>
