<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Razorpay SaaS Demo</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 700px;
        margin: 40px auto;
        padding: 0 16px;
      }
      .card {
        border: 1px solid #ddd;
        border-radius: 10px;
        padding: 20px;
      }
      button {
        border: none;
        border-radius: 8px;
        background: #1d4ed8;
        color: #fff;
        font-weight: 700;
        padding: 12px 16px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      #status {
        margin-top: 12px;
        color: #0f172a;
      }
      #error {
        margin-top: 12px;
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>SaaS Access</h1>
      <p id="usage">Remaining free usage: 5/5</p>
      <button id="upgradeBtn">🚀 Upgrade to Pro</button>
      <button id="generateBtn">Use Generate</button>
      <p id="status"></p>
      <p id="error"></p>
    </div>

    <script>
      const API_BASE = "http://127.0.0.1:8000";
      const usageEl = document.getElementById("usage");
      const statusEl = document.getElementById("status");
      const errorEl = document.getElementById("error");
      const upgradeBtn = document.getElementById("upgradeBtn");
      const generateBtn = document.getElementById("generateBtn");

      function setError(message) {
        errorEl.textContent = message || "";
      }

      function setStatus(message) {
        statusEl.textContent = message || "";
      }

      async function refreshUsage() {
        try {
          const response = await fetch(`${API_BASE}/user-state`);
          const data = await response.json();

          if (data.is_paid) {
            usageEl.textContent = "Unlimited access";
            return;
          }

          const remaining = Math.max(0, 5 - Number(data.usage_count || 0));
          usageEl.textContent = `Remaining free usage: ${remaining}/5`;
        } catch (err) {
          setError(`Unable to fetch user state: ${err.message}`);
        }
      }

      async function createOrder() {
        const response = await fetch(`${API_BASE}/create-order`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({})
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || "Failed to create order");
        }

        return data;
      }

      async function verifyPayment(payload) {
        const response = await fetch(`${API_BASE}/verify-payment`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || "Payment verification failed");
        }

        return data;
      }

      upgradeBtn.addEventListener("click", async () => {
        setError("");
        setStatus("");
        upgradeBtn.disabled = true;

        try {
          const order = await createOrder();

          const options = {
            key: order.key_id,
            amount: order.amount,
            currency: order.currency,
            name: "My SaaS App",
            description: "Pro Plan Upgrade",
            order_id: order.order_id,
            handler: async function (response) {
              try {
                await verifyPayment(response);
                setStatus("Payment successful. Unlimited access enabled.");
                await refreshUsage();
              } catch (err) {
                setError(err.message);
              }
            },
            modal: {
              ondismiss: function () {
                setStatus("Payment popup closed.");
              }
            }
          };

          const rzp = new Razorpay(options);
          rzp.on("payment.failed", function (response) {
            const description = response.error?.description || "Payment failed";
            setError(description);
          });
          rzp.open();
        } catch (err) {
          setError(err.message);
        } finally {
          upgradeBtn.disabled = false;
        }
      });

      generateBtn.addEventListener("click", async () => {
        setError("");
        setStatus("");

        try {
          const response = await fetch(`${API_BASE}/generate`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt: "Generate sample output" })
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.detail || "Request failed");
          }

          setStatus(data.message);
          await refreshUsage();
        } catch (err) {
          setError(err.message);
        }
      });

      refreshUsage();
    </script>
  </body>
</html>
