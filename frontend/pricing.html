<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Pricing</title>
    <style>
      :root {
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --background: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --border: #e2e8f0;
        --shadow-soft: 0 12px 32px rgba(15, 23, 42, 0.08);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top, #eef4ff 0%, var(--background) 40%);
      }
      .shell { width: min(1080px, calc(100% - 40px)); margin: 28px auto 48px; }
      .hero { text-align:center; margin: 34px 0 28px; }
      .hero h1 { margin:0; font-size: clamp(2rem, 4.5vw, 2.8rem); letter-spacing:-0.03em; }
      .grid { display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
      .card { background:var(--card); border:1px solid var(--border); border-radius:18px; box-shadow: var(--shadow-soft); padding:24px; }
      h2 { margin: 0 0 6px; font-size: 1.35rem; }
      .price { font-size: 2rem; font-weight: 800; margin: 8px 0 14px; }
      .btn { margin-top: 18px; width: 100%; border-radius: 10px; border:1px solid var(--border); background: #fff; color:#1e293b; font: inherit; font-weight: 600; padding: 11px 14px; cursor:pointer; }
      .btn-primary { background:var(--primary); border-color: var(--primary); color:#fff; }
      .btn-primary:hover { background:var(--primary-hover); border-color:var(--primary-hover); }
      @media (max-width: 860px){ .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <h1>Simple Pricing</h1>
      </section>
      <section class="grid">
        <article class="card">
          <h2>Free Plan</h2>
          <div class="price">₹0</div>
        </article>
        <article class="card">
          <h2>Pro Plan</h2>
          <div class="price">₹99/month</div>
          <button id="pay-btn" class="btn btn-primary">🚀 Upgrade to Pro – ₹99</button>
        </article>
      </section>
    </main>
    <script>
      document.getElementById('pay-btn').onclick = async function () {
        const stored = JSON.parse(localStorage.getItem('testpilot_user') || '{}');
        const userId = stored.user_id || 'guest-user';
        const email = stored.email || 'customer@testpilot.ai';

        const res = await fetch('/api/create-payment-link', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: userId, email }),
        });

        const data = await res.json();
        window.location.href = data.short_url;
      };
    </script>
  </body>
</html>
